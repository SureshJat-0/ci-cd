name: Server CI CD

on:
  push:
    branches:
      - main

jobs:
  cicd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_ACCESS_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            ${{ secrets.DOCKER_ACCESS_USERNAME}}/ci-docker-server:latest
            ${{ secrets.DOCKER_ACCESS_USERNAME}}/ci-docker-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha, node=max

      - name: Triger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
