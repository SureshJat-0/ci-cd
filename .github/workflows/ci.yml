name: MERN Monorepo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017

    env:
      PORT: 3000
      MONGO_URI: mongodb://localhost:27017/testdb

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run Tests
        run: npm run test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run Tests
        run: npm run test

      - name: Build React(vite)
        run: npm run build