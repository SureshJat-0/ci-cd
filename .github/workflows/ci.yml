name: MERN Monorepo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017

    env:
      PORT: 3000
      MONGO_URI: mongodb://localhost:27017/testdb

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run Tests
        run: npm run test

      - name: Build Docker image
        run: |
          docker build -t ci-docker-server .
          docker images

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run Tests
        run: npm run test

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ACCESS_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
      
      - uses: docker/build-push-actions@v6
        with:
          context: .
          push: false
          tags: sureshjat0/ci-docker-server:latest

      - name: Build React(vite)
        run: npm run build