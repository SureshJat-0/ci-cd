name: MERN Monorepo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017

    env:
      PORT: 3000
      MONGO_URI: mongodb://localhost:27017/testdb

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_ACCESS_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_ACCESS_USERNAME }}/ci-docker-server:latest
            ${{ secrets.DOCKER_ACCESS_USERNAME }}/ci-docker-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha, node=max

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build React(vite)
        run: npm run build
